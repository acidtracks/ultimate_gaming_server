# switch-display.conf — Configuration du basculement d'affichage
#
# DDC_SCREEN_OFF : éteint l'écran physique via DDC/CI au démarrage du stream
#   true  → luminosité à 0 (écran éteint)
#   false → écran physique inchangé pendant le stream
DDC_SCREEN_OFF=false

# DDC_BRIGHTNESS_OFF : luminosité appliquée quand DDC_SCREEN_OFF=true (0-100)
DDC_BRIGHTNESS_OFF=0

# DDC_BRIGHTNESS_ON : luminosité restaurée à la fin du stream (0-100)
DDC_BRIGHTNESS_ON=65
