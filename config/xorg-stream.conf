Section "ServerFlags"
    Option "DontZap" "false"
EndSection

Section "Device"
    Identifier  "nvidia-stream"
    Driver      "nvidia"
    Option      "AllowEmptyInitialConfiguration" "yes"
    Option      "AutoAddGPU" "false"
    # Display virtuel DFP-0 : pas de signal physique, NvFBC capture en mémoire GPU.
    Option      "ConnectedMonitor" "DFP-0"
    Option      "UseEdid" "false"
    # Désactive la validation NVIDIA pour permettre les modes xrandr personnalisés.
    Option      "ModeValidation" "NoEdidModes, NoMaxPClkCheck, NoDFPNativeResCheck, AllowNon60HzDFPModes"
EndSection

Section "Screen"
    Identifier  "screen-stream"
    Device      "nvidia-stream"
    Monitor     "monitor-stream"
    DefaultDepth 30
    SubSection "Display"
        Depth   30
        Virtual 3840 2160
        # Pas de liste Modes restrictive : tous les modelines du Monitor sont disponibles
        # à toutes les profondeurs, y compris 120Hz pour les jeux 10-bit (FF16, HDR...).
    EndSubSection
EndSection

Section "Monitor"
    Identifier  "monitor-stream"
    Option      "DPMS" "false"
    HorizSync   1-200
    VertRefresh 1-240
    Modeline "1920x1080_60.00"  173.00  1920 2048 2248 2576  1080 1083 1088 1120 -hsync +vsync
    Modeline "1280x720_60.00"    74.48  1280 1336 1472 1664   720  721  724  746  -hsync +vsync
    Modeline "1920x1080R"       285.25  1920 1968 2000 2080  1080 1083 1088 1144 +hsync -vsync
    Modeline "2560x1440R"       497.25  2560 2608 2640 2720  1440 1443 1448 1525 +hsync -vsync
EndSection
